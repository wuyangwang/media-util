name: Build and Release Windows (Dev)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TSC_VERSION: "0.9.0"

jobs:
  build:
    runs-on: windows-latest
    environment: release

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          prefix-key: 'v1-rust'
          cache-on-failure: true

      - name: Install Vulkan SDK (Windows x64)
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Shorten build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Build and Release (Dev Pre-release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: dev-v__VERSION__-${{ github.run_number }}
          releaseName: 'dev-v__VERSION__ (build ${{ github.run_number }})'
          releaseBody: 'Automated dev prerelease build.'
          releaseDraft: false
          prerelease: true
          args: ''
