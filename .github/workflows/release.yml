name: Build and Release Windows

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'


      # ✅ 依赖安装（会命中缓存）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ⭐⭐⭐ 核心优化：针对 Tauri 目录结构的 Rust 缓存
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # 明确指向 Tauri 的 Rust 源码目录
          workspaces: "src-tauri -> target"
          # 增加 prefix-key 防止缓存冲突，并确保 CI 环境下能正确恢复
          prefix-key: "v1-rust"
          cache-on-failure: true

      # 使用 tauri-action 进行构建和发布
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets below to download the latest version."
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi
