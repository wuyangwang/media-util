name: Build and Release Windows

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  TSC_VERSION: "0.9.0"
  
jobs:
  build:
    runs-on: windows-latest
    environment: release

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # ✅ 依赖安装（会命中缓存）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ⭐⭐⭐ 核心优化：针对 Tauri 目录结构的 Rust 缓存
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # 明确指向 Tauri 的 Rust 源码目录
          workspaces: 'src-tauri -> target'
          # 增加 prefix-key 防止缓存冲突，并确保 CI 环境下能正确恢复
          prefix-key: 'v1-rust'
          cache-on-failure: true

      - name: Install Vulkan SDK (Windows x64)
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Cache trusted-signing-cli
        id: cache-tsc
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trusted-signing-cli*
          key: trusted-signing-cli-${{ env.TSC_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install trusted-signing-cli
        run: cargo install trusted-signing-cli@${{ env.TSC_VERSION }}

      # whisper-rs-sys cmake builds create paths that exceed Windows MAX_PATH
      # (260 chars). Shorten the target dir to keep paths under the limit.
      - name: Shorten build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      # 使用 tauri-action 进行构建和发布
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets below to download the latest version.'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi
