name: Build and Release Windows

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'


      # ✅ 依赖安装（会命中缓存）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ⭐⭐⭐ 核心优化：针对 Tauri 目录结构的 Rust 缓存
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # 明确指向 Tauri 的 Rust 源码目录
          workspaces: "src-tauri -> target"
          # 增加 prefix-key 防止缓存冲突，并确保 CI 环境下能正确恢复
          prefix-key: "v1-rust"
          cache-on-failure: true

      # 读取版本号
      - name: Get version from package.json
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 构建
      - name: Build Windows app
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis,msi
        env:
          CI: true
          # 配合 Cargo.toml 中的 incremental = true
          CARGO_INCREMENTAL: 1

      # 发布
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
